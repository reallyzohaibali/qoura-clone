<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Qoura</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-xl navbar-light bg-white border-bottom py-2 shadow-sm fixed-top">
        <div class="container" style="max-width: 1200px;">    
            <a class="navbar-brand quora-brand me-4 pe-1" href="#">Quora</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#quoraNavbarNavigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        <div class="collapse navbar-collapse" id="quoraNavbarNavigation">
            <ul class="navbar-nav me-3 mb-2 mb-xl-0 d-flex flex-row gap-1">
                <li class="nav-item">
                    <a class="nav-link nav-icon-link active" href="#" title="Home"><i class="bi bi-house-door-fill"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-icon-link" href="#" title="Following"><i class="bi bi-list-task"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-icon-link" href="#" title="Answer"><i class="bi bi-pencil-square"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-icon-link" href="#" title="Spaces"><i class="bi bi-people"></i></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-icon-link" href="#" title="Notifications"><i class="bi bi-bell"></i></a>
                </li>
            </ul>
            <form class="d-flex flex-grow-1 search-container me-3 position-relative mb-2 mb-xl-0">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted" style="font-size: 14px;"></i>
                <input class="form-control search-input ps-5 py-1 w-100" type="search" placeholder="Search Quora" aria-label="Search">
            </form>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <button class="btn btn-quora-plus px-3 py-1">Try Quora +</button>
                <a href="#" class="d-block flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&h=100&q=80" alt="Profile" class="profile-pic">
                </a>
                <a href="#" class="globe-icon d-flex align-items-center" title="Languages"><i class="bi bi-globe"></i></a>
                <div class="btn-group shadow-sm">
                    <button type="button" class="btn btn-add-question px-3 py-1">Add question</button>
                    <button type="button" class="btn btn-add-question-dropdown dropdown-toggle dropdown-toggle-split px-2" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="visually-hidden">Toggle Dropdown</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item fs-7" href="#">Create post</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
